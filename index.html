<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Market News</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0f1923;
    --bg-secondary: #1a2736;
    --bg-card: #1e2d3d;
    --bg-card-hover: #243647;
    --text-primary: #e8edf2;
    --text-secondary: #8899aa;
    --text-muted: #5a6f82;
    --accent: #00b4d8;
    --accent-hover: #0096c7;
    --danger: #e63946;
    --danger-bg: rgba(230, 57, 70, 0.08);
    --danger-border: rgba(230, 57, 70, 0.6);
    --border: #2a3a4a;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.25);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo h1 span { color: var(--accent); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .timestamp {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .btn-fetch {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .btn-fetch:hover { background: var(--accent-hover); }
  .btn-fetch:active { transform: scale(0.97); }
  .btn-fetch:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-fetch .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-fetch.loading .spinner { display: block; }
  .btn-fetch.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs {
    max-width: 1100px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 4px;
  }

  .tab {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 10px 24px;
    border-radius: 8px 8px 0 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover { color: var(--text-primary); }

  .tab.active {
    background: var(--bg-card);
    color: var(--accent);
    border-color: var(--accent);
    border-bottom: 1px solid var(--bg-card);
    position: relative;
    z-index: 2;
  }

  .tab .count {
    background: var(--bg-primary);
    color: var(--text-muted);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 6px;
  }

  .tab.active .count {
    background: rgba(0,180,216,0.15);
    color: var(--accent);
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  .feed-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) var(--radius);
    min-height: 400px;
    padding: 24px;
  }

  .feed { display: none; }
  .feed.active { display: block; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p { font-size: 15px; margin-top: 8px; }

  .news-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-left: 4px solid transparent;
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .news-card:hover {
    background: var(--bg-card-hover);
    border-left-color: var(--accent);
  }

  .news-card.critical {
    border-left-color: var(--danger) !important;
    background: var(--danger-bg);
  }

  .news-card.critical:hover {
    background: rgba(230, 57, 70, 0.12);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .badge-important {
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-primary);
    flex: 1;
  }

  .news-card.critical .card-title { color: #ff8a93; }

  .card-snippet {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-source {
    font-weight: 600;
    color: var(--accent);
  }

  .multi-source-badge {
    background: rgba(0,180,216,0.15);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
    cursor: pointer;
  }

  .sources-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    border-top: 0px solid var(--border);
    margin-top: 0;
  }

  .sources-panel.open {
    max-height: 500px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    padding-top: 12px;
  }

  .sources-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .source-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 4px;
    background: var(--bg-primary);
    border-radius: 6px;
    text-decoration: none;
    color: var(--text-primary);
    font-size: 13px;
    transition: background 0.15s;
  }

  .source-link:hover { background: var(--bg-card-hover); }

  .source-link-name {
    font-weight: 600;
    color: var(--accent);
    min-width: 140px;
    flex-shrink: 0;
  }

  .source-link-title {
    flex: 1;
    margin: 0 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .source-link-time {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .source-link-arrow {
    color: var(--text-muted);
    margin-left: 8px;
    font-size: 14px;
  }

  .loading-overlay {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .loading-overlay.visible { display: block; }

  .loading-overlay .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .loading-overlay .dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .loading-overlay .dot:nth-child(2) { animation-delay: 0.15s; }
  .loading-overlay .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .error-msg {
    background: rgba(230, 57, 70, 0.1);
    border: 1px solid var(--danger-border);
    color: #ff8a93;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat {
    font-size: 12px;
    color: var(--text-muted);
  }

  .stat strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .stat.critical-stat strong { color: var(--danger); }

  .sub-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: var(--bg-primary);
    padding: 4px;
    border-radius: 8px;
    width: fit-content;
  }

  .sub-tab {
    background: transparent;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }

  .sub-tab:hover { color: var(--text-primary); }

  .sub-tab.active {
    background: var(--accent);
    color: #fff;
  }

  .dashboard-sub { display: none; }
  .dashboard-sub.active { display: block; }

  .dashboard-section { margin-bottom: 24px; }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 10px;
  }

  .market-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }

  .market-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
  }

  .market-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .market-card-name {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .market-card-country {
    display: inline-block;
    font-size: 9px;
    line-height: 1;
    padding: 2px 5px;
    margin-left: 5px;
    border-radius: 3px;
    background: rgba(136, 153, 170, 0.15);
    color: var(--text-secondary);
    font-weight: 600;
    letter-spacing: 0.3px;
    vertical-align: middle;
  }

  .market-card-source {
    display: inline-block;
    font-size: 10px;
    line-height: 1;
    padding: 3px 6px;
    margin-bottom: 8px;
    border-radius: 999px;
    border: 1px solid rgba(0, 180, 216, 0.4);
    background: rgba(0, 180, 216, 0.12);
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.35px;
  }

  .market-card-price {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .market-card-change {
    font-size: 13px;
    font-weight: 600;
  }

  .price-up { color: #22c55e; }
  .price-down { color: var(--danger); }

  .market-card-loading {
    color: var(--text-muted);
    font-size: 12px;
  }

  .chart-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }

  .chart-panel.visible { display: block; }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .chart-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .range-selector {
    display: flex;
    gap: 4px;
  }

  .range-btn {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .range-btn:hover { color: var(--text-primary); }

  .range-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .chart-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  .chart-close:hover { color: var(--text-primary); }

  .chart-canvas-wrap {
    position: relative;
    height: 300px;
  }

  .chart-status {
    min-height: 20px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }

  @media (max-width: 768px) {
    .header-inner { gap: 12px; }
    .feed-container { padding: 18px; }
    .news-card { padding: 16px 18px; }
    .card-meta { gap: 10px; flex-wrap: wrap; }
    .source-link-name { min-width: 100px; }
    .source-link-title { margin: 0 8px; }
    .market-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .chart-canvas-wrap { height: 250px; }
  }

  @media (max-width: 640px) {
    header { padding: 14px 0; }

    .header-inner {
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      padding: 0 16px;
    }

    .logo { justify-content: center; }
    .logo h1 { font-size: 18px; }
    .logo-icon { width: 34px; height: 34px; font-size: 18px; }

    .header-actions {
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .btn-fetch {
      padding: 12px 20px;
      font-size: 14px;
      min-height: 44px;
      flex: 1;
      justify-content: center;
    }

    .timestamp {
      font-size: 11px;
      flex-shrink: 0;
    }

    .tabs {
      gap: 0;
      margin-top: 16px;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 10px 18px;
      font-size: 13px;
      min-height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex: 1;
      justify-content: center;
    }

    main { padding: 0 16px 40px; }

    .feed-container {
      padding: 14px;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .news-card {
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .card-header {
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-title { font-size: 14px; }
    .card-snippet { font-size: 13px; -webkit-line-clamp: 3; }

    .card-meta {
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
    }

    .card-meta span[style] {
      width: 100%;
      margin-left: 0 !important;
      margin-top: 4px;
    }

    .stats-bar {
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat { font-size: 11px; }

    .source-link {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 4px;
      min-height: 44px;
    }

    .source-link-name {
      min-width: auto;
      width: 100%;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .source-link-title {
      margin: 0;
      white-space: normal;
      -webkit-line-clamp: 2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      width: 100%;
      font-size: 12px;
    }

    .source-link-time { font-size: 10px; }
    .source-link-arrow { display: none; }

    .empty-state { padding: 50px 16px; }
    .empty-state .icon { font-size: 40px; }
    .empty-state h3 { font-size: 16px; }
    .empty-state p { font-size: 13px; }

    .badge-important { font-size: 9px; padding: 2px 6px; }
    .multi-source-badge { font-size: 10px; padding: 2px 6px; }

    .error-msg { font-size: 12px; padding: 12px 14px; }

    .loading-overlay { padding: 40px 16px; }

    .sub-tabs { width: 100%; }
    .sub-tab { flex: 1; text-align: center; padding: 8px 12px; font-size: 12px; }
    .market-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .market-card { padding: 12px; }
    .market-card-price { font-size: 17px; }
    .market-card-change { font-size: 12px; }
    .chart-panel { padding: 14px; }
    .chart-canvas-wrap { height: 200px; }
    .chart-header { gap: 8px; }
    .range-btn { padding: 4px 8px; font-size: 11px; }
  }

  @media (max-width: 380px) {
    .header-inner { padding: 0 12px; }
    .tabs { padding: 0 12px; }
    main { padding: 0 12px 32px; }
    .feed-container { padding: 10px; }
    .news-card { padding: 12px; }
    .tab { padding: 10px 12px; font-size: 12px; }
    .card-title { font-size: 13px; }
    .btn-fetch { padding: 12px 16px; font-size: 13px; }
  }

  @media (hover: none) and (pointer: coarse) {
    .news-card { -webkit-tap-highlight-color: transparent; }
    .news-card:active {
      background: var(--bg-card-hover);
      border-left-color: var(--accent);
    }
    .news-card.critical:active {
      background: rgba(230, 57, 70, 0.12);
    }
    .btn-fetch:active { transform: scale(0.97); }
    .tab:active { color: var(--text-primary); }
    .source-link:active { background: var(--bg-card-hover); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">$</div>
      <h1>Market <span>Pulse</span></h1>
    </div>
    <div class="header-actions">
      <span class="timestamp" id="timestamp">Not yet fetched</span>
      <button class="btn-fetch" id="fetchBtn" onclick="fetchAllNews()">
        <div class="spinner"></div>
        <span class="btn-text">Fetch Latest News</span>
      </button>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">
    Dashboard
  </button>
  <button class="tab" data-tab="global" onclick="switchTab('global')">
    Global Markets <span class="count" id="globalCount">0</span>
  </button>
  <button class="tab" data-tab="india" onclick="switchTab('india')">
    Indian Markets <span class="count" id="indiaCount">0</span>
  </button>
</div>

<main>
  <div class="feed-container">
    <div id="errorMsg" class="error-msg"></div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <p style="color:var(--text-muted)">Fetching latest financial news...</p>
    </div>

    <div id="dashboardFeed" class="feed active">
      <div class="sub-tabs">
        <button class="sub-tab active" data-subtab="dm" onclick="switchDashboardTab('dm')">DM &mdash; Developed</button>
        <button class="sub-tab" data-subtab="em" onclick="switchDashboardTab('em')">EM &mdash; Emerging</button>
      </div>
      <div id="chartPanel" class="chart-panel">
        <div class="chart-header">
          <span class="chart-title" id="chartTitle"></span>
          <div class="range-selector" id="rangeSelector"></div>
          <button class="chart-close" onclick="closeChart()">&times;</button>
        </div>
        <div class="chart-canvas-wrap">
          <canvas id="priceChart"></canvas>
        </div>
        <div id="chartStatus" class="chart-status"></div>
      </div>
      <div id="dmDashboard" class="dashboard-sub active"></div>
      <div id="emDashboard" class="dashboard-sub"></div>
    </div>

    <div id="globalFeed" class="feed">
      <div class="empty-state" id="globalEmpty">
        <div class="icon">&#128200;</div>
        <h3>Global Market News</h3>
        <p>Click "Fetch Latest News" to load headlines</p>
      </div>
    </div>

    <div id="indiaFeed" class="feed">
      <div class="empty-state" id="indiaEmpty">
        <div class="icon">&#127470;&#127475;</div>
        <h3>Indian Market News</h3>
        <p>Click "Fetch Latest News" to load headlines</p>
      </div>
    </div>
  </div>

function isCritical(text) {
  const lower = text.toLowerCase();
  return CRITICAL_KEYWORDS.some(kw => {
    const re = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
    return re.test(lower);
  });
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function timeAgo(dateStr) {
  const now = new Date();
  const then = new Date(dateStr);
  if (isNaN(then)) return '';
  const diffMs = now - then;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

function parseRss2Json(feedInfo) {
  return fetchWithTimeout(RSS2JSON_API + encodeURIComponent(feedInfo.url), FETCH_TIMEOUT_MS)
    .then(r => r.json())
    .then(data => {
      if (data.status !== 'ok' || !data.items) throw new Error('rss2json fail');
      return data.items.map(item => ({
        title: stripHtml(item.title || ''),
        snippet: stripHtml(item.description || item.content || '').slice(0, 250),
        link: item.link || '',
        pubDate: item.pubDate || '',
        source: feedInfo.name
      }));
    });
}

function parseAllOrigins(feedInfo) {
  return fetchViaProxy(feedInfo.url)
    .then(r => r.text())
    .then(xml => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const items = doc.querySelectorAll('item');
      return Array.from(items).map(item => ({
        title: stripHtml(item.querySelector('title')?.textContent || ''),
        snippet: stripHtml(item.querySelector('description')?.textContent || '').slice(0, 250),
        link: item.querySelector('link')?.textContent || '',
        pubDate: item.querySelector('pubDate')?.textContent || '',
        source: feedInfo.name
      }));
    });
}

async function fetchViaProxy(targetUrl) {
  const attempts = CORS_PROXIES.map(proxy => fetchWithTimeout(proxy + encodeURIComponent(targetUrl), FETCH_TIMEOUT_MS)
    .then(resp => {
      if (!resp.ok) throw new Error('Proxy HTTP ' + resp.status);
      return resp;
    }));
  return Promise.any(attempts);
}

async function fetchJsonViaProxy(targetUrl) {
  const attempts = CORS_PROXIES.map(proxy => fetchWithTimeout(proxy + encodeURIComponent(targetUrl), FETCH_TIMEOUT_MS)
    .then(resp => {
      if (!resp.ok) throw new Error('Proxy HTTP ' + resp.status);
      return resp.json();
    }));
  try {
    return await Promise.any(attempts);
  } catch (err) {
    // #region agent log
    agentDebugLog('run-1','H4','index.html:fetchJsonViaProxy','All proxies failed', { targetUrl, error: String(err) });
    // #endregion
    throw err;
  }
}

function parseFiniteNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function normalizeYahooQuote(q) {
  const price =
    parseFiniteNumber(q.regularMarketPrice) ??
    parseFiniteNumber(q.postMarketPrice) ??
    parseFiniteNumber(q.preMarketPrice) ??
    parseFiniteNumber(q.bid) ??
    parseFiniteNumber(q.ask);
  const explicitPrevClose = parseFiniteNumber(q.regularMarketPreviousClose);
  const explicitChange = parseFiniteNumber(q.regularMarketChange);
  const explicitChangePct = parseFiniteNumber(q.regularMarketChangePercent);
  if (price == null) return null;
  const prevClose =
    explicitPrevClose ??
    (explicitChange != null ? price - explicitChange : null);
  const change =
    explicitChange ??
    (prevClose != null ? price - prevClose : 0);
  const changePct =
    explicitChangePct ??
    (prevClose && prevClose !== 0 ? (change / prevClose) * 100 : 0);
  return {
    symbol: q.symbol,
    price,
    change,
    changePct,
    currency: q.currency || 'USD',
    source: 'Yahoo'
  };
}

async function fetchYahooBatchQuotes(symbols) {
  if (symbols.length === 0) return {};
  const target = YAHOO_QUOTE_API + symbols.join(',');
  const json = await fetchJsonViaProxy(target);
  const list = json.quoteResponse?.result || [];
  const returnedSymbols = new Set(list.map(q => q.symbol));
  const missingSymbols = symbols.filter(s => !returnedSymbols.has(s));
  // #region agent log
  agentDebugLog('run-1','H1','index.html:fetchYahooBatchQuotes','Yahoo batch response summary', {
    requestedCount: symbols.length,
    returnedCount: list.length,
    missingSymbols: missingSymbols.slice(0, 30)
  });
  // #endregion
  const map = {};
  const invalidRows = [];
  for (const q of list) {
    const normalized = normalizeYahooQuote(q);
    if (!normalized) {
      invalidRows.push({
        symbol: q.symbol,
        regularMarketPrice: q.regularMarketPrice,
        regularMarketPreviousClose: q.regularMarketPreviousClose,
        regularMarketChange: q.regularMarketChange,
        regularMarketChangePercent: q.regularMarketChangePercent
      });
      continue;
    }
    map[q.symbol] = normalized;
  }
  // #region agent log
  agentDebugLog('run-1','H2','index.html:fetchYahooBatchQuotes','Yahoo rows skipped due null fields', {
    invalidCount: invalidRows.length,
    invalidRows: invalidRows.slice(0, 30)
  });
  // #endregion
  return map;
}

async function fetchYahooChartSnapshot(symbol) {
  const target = YAHOO_CHART_API + encodeURIComponent(symbol) + '?range=5d&interval=1d';
  const json = await fetchJsonViaProxy(target);
  const result = json.chart?.result?.[0];
  if (!result) return null;
  const closes = (result.indicators?.quote?.[0]?.close || []).filter(v => Number.isFinite(v));
  if (closes.length === 0) return null;
  const last = closes[closes.length - 1];
  const prev = closes.length > 1 ? closes[closes.length - 2] : (result.meta?.chartPreviousClose ?? result.meta?.previousClose ?? last);
  if (!Number.isFinite(last) || !Number.isFinite(prev)) return null;
  const change = last - prev;
  const changePct = prev === 0 ? 0 : (change / prev) * 100;
  return {
    symbol,
    price: last,
    change,
    changePct,
    currency: result.meta?.currency || 'USD',
    source: 'Yahoo Chart'
  };
}

        return [symbol, null];
      }

    for (const [symbol, data] of pairs) {

}

async function fetchStooqHistory(stooqSymbol) {
  const now = new Date();
  const start = new Date(now);
  start.setDate(start.getDate() - 10);
  const fmt = d => d.toISOString().slice(0, 10).replace(/-/g, '');
  const url = 'https://stooq.com/q/d/l/?s=' + encodeURIComponent(stooqSymbol)
    + '&d1=' + fmt(start) + '&d2=' + fmt(now) + '&i=d';
  const resp = await fetchViaProxy(url);
  const csv = await resp.text();
  const lines = csv.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length < 3) return null;
  const rows = lines.slice(1)
    .map(line => line.split(','))
    .map(cols => ({ close: parseFiniteNumber(cols[4]) }))
    .filter(row => row.close != null);
  if (rows.length < 2) return null;
  return {
    last: rows[rows.length - 1].close,
    prev: rows[rows.length - 2].close
  };
}

async function fetchCommodityDirectQuotes() {
  const entries = Object.entries(STOOQ_COMMODITY_MAP);

      const hist = await fetchStooqHistory(stooqSymbol);
      if (!hist) return [yahooSymbol, null];
      const change = hist.last - hist.prev;
      const changePct = hist.prev === 0 ? 0 : (change / hist.prev) * 100;
      return [yahooSymbol, {
        symbol: yahooSymbol,
        price: hist.last,
        change,
        changePct,
        currency: 'USD',
        source: 'Stooq'
      }];
    } catch (_) {
      return [yahooSymbol, null];
    }
  }));
  const map = {};

    const data = await resp.json();
    const points = data.prices.map(([t, p]) => ({ time: new Date(t), price: p }));
    const baseline = points.length > 0 ? points[0].price : null;
    return { points, baseline, currency: 'USD' };
  }
  const target = YAHOO_CHART_API + encodeURIComponent(symbol) + '?range=' + range + '&interval=' + interval;
  const json = await fetchJsonViaProxy(target);
  const result = json.chart?.result?.[0];
  if (!result) throw new Error('No chart data');
  const timestamps = result.timestamp || [];
  const closes = result.indicators?.quote?.[0]?.close || [];
  const points = timestamps.map((t, i) => ({
    time: new Date(t * 1000),
    price: closes[i]
  })).filter(d => d.price != null);
  const baseline = parseFiniteNumber(result.meta?.chartPreviousClose) ?? parseFiniteNumber(result.meta?.previousClose) ?? (points[0]?.price ?? null);
  return { points, baseline, currency: result.meta?.currency || 'USD' };
}

const STOP_WORDS = new Set([
  'a','an','the','and','or','but','in','on','at','to','for','of','is','are','was',
  'were','be','been','being','have','has','had','do','does','did','will','would',
  'shall','should','may','might','can','could','with','from','by','as','into',
  'through','during','before','after','above','below','between','out','off','over',
  'under','again','further','then','once','that','this','these','those','it','its',
  'not','no','nor','so','very','just','also','about','up','more','most','than',
  'how','what','when','where','who','which','why','all','each','every','both',
  'few','some','such','only','own','same','too','s','t','re','ve','ll','d','m',
  'says','said','new','now','get','gets','got','us','vs','per',
]);

function extractSignificantWords(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 2 && !STOP_WORDS.has(w));
}

function similarity(wordsA, wordsB) {
  if (wordsA.length === 0 || wordsB.length === 0) return 0;
  const setA = new Set(wordsA);
  const setB = new Set(wordsB);
  let intersection = 0;
  for (const w of setA) { if (setB.has(w)) intersection++; }
  const union = new Set([...setA, ...setB]).size;
  return union === 0 ? 0 : intersection / union;
}

function groupSimilarNews(items) {
  const groups = [];
  const processed = items.map(item => ({
    item,
    words: extractSignificantWords(item.title)
  }));

  const used = new Set();
  for (let i = 0; i < processed.length; i++) {
    if (used.has(i)) continue;
    const group = [processed[i].item];
    used.add(i);
    for (let j = i + 1; j < processed.length; j++) {
      if (used.has(j)) continue;
      const sim = similarity(processed[i].words, processed[j].words);
      if (sim >= 0.4) {
        group.push(processed[j].item);
        used.add(j);
      }
    }
    const primary = group.reduce((best, cur) =>
      (cur.snippet.length > best.snippet.length) ? cur : best, group[0]);
    const critical = group.some(g => g.critical);
    const latestDate = group.reduce((best, cur) => {
      const d = new Date(cur.pubDate);
      return d > best ? d : best;
    }, new Date(0));

    groups.push({ primary, articles: group, critical, latestDate });
  }

  return groups.sort((a, b) => b.latestDate - a.latestDate);
}

function toggleSources(id) {
  const panel = document.getElementById('src-' + id);
  if (panel) panel.classList.toggle('open');
}

function renderFeed(category) {
  const container = document.getElementById(category + 'Feed');
  const items = newsData[category];

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">${category === 'global' ? '&#128200;' : '&#127470;&#127475;'}</div>
        <h3>${category === 'global' ? 'Global' : 'Indian'} Market News</h3>
        <p>No articles found. Try fetching again.</p>
      </div>`;
    return;
  }

  const groups = groupSimilarNews(items);
  const criticalCount = groups.filter(g => g.critical).length;
  const totalArticles = groups.reduce((sum, g) => sum + g.articles.length, 0);
  const uniqueSources = new Set(items.map(n => n.source)).size;

  let html = `<div class="stats-bar">
    <div class="stat"><strong>${groups.length}</strong> stories (<strong>${totalArticles}</strong> articles merged)</div>
    <div class="stat critical-stat"><strong>${criticalCount}</strong> critical</div>
    <div class="stat">from <strong>${uniqueSources}</strong> sources</div>
  </div>`;

  groups.forEach((group, idx) => {
    const p = group.primary;
    const isMerged = group.articles.length > 1;
    const cardId = category + idx;

    html += `<div class="news-card${group.critical ? ' critical' : ''}" ${!isMerged ? `onclick="window.open('${p.link}','_blank')"` : `onclick="toggleSources('${cardId}')"`}>
      <div class="card-header">
        ${group.critical ? '<span class="badge-important">Important</span>' : ''}
        ${isMerged ? `<span class="multi-source-badge">${group.articles.length} sources</span>` : ''}
        <div class="card-title">${escapeHtml(p.title)}</div>
      </div>
      ${p.snippet ? `<div class="card-snippet">${escapeHtml(p.snippet)}</div>` : ''}
      <div class="card-meta">
        <span class="card-source">${escapeHtml(p.source)}</span>
        ${p.pubDate ? `<span>${timeAgo(p.pubDate)}</span>` : ''}
        ${isMerged ? '<span style="margin-left:auto;color:var(--accent);font-size:11px;">Click to see all sources &#9662;</span>' : ''}
      </div>
      ${isMerged ? renderSourcesPanel(cardId, group.articles) : ''}
    </div>`;
  });

  container.innerHTML = html;
  document.getElementById(category + 'Count').textContent = groups.length;
}

function renderSourcesPanel(id, articles) {
  let html = `<div class="sources-panel" id="src-${id}">
    <div class="sources-panel-title">Read from any source:</div>`;
  for (const a of articles) {
    html += `<a href="${a.link}" target="_blank" rel="noopener" class="source-link" onclick="event.stopPropagation()">
      <span class="source-link-name">${escapeHtml(a.source)}</span>
      <span class="source-link-title">${escapeHtml(a.title)}</span>
      ${a.pubDate ? `<span class="source-link-time">${timeAgo(a.pubDate)}</span>` : ''}
      <span class="source-link-arrow">&#8594;</span>
    </a>`;
  }
  html += '</div>';
  return html;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatPrice(price, currency) {
  if (price == null) return '—';
  const opts = { minimumFractionDigits: 2, maximumFractionDigits: 2 };
  if (currency === 'USD') return '$' + price.toLocaleString('en-US', opts);
  if (currency === 'INR') return '₹' + price.toLocaleString('en-IN', opts);
  if (currency === 'EUR') return '€' + price.toLocaleString('en-US', opts);
  if (currency === 'GBP') return '£' + price.toLocaleString('en-US', opts);
  if (currency === 'JPY') return '¥' + Math.round(price).toLocaleString();
  return price.toLocaleString('en-US', opts);
}

function formatYield(value) {
  if (value == null) return '—';
  return value.toFixed(3) + '%';
}

function renderMarketSection(title, items, containerId) {
  if (!items || items.length === 0) return '';
  const isCommodities = title === 'Commodities';
  let html = `<div class="dashboard-section">
    <div class="section-title">${title}</div>
    <div class="market-grid">`;
  for (const item of items) {
    const key = item.id || item.symbol;
    const data = dashData[key];
    const isYield = item.type === 'yield';
    const countryTag = item.country
      ? `<span class="market-card-country">${escapeHtml(item.country)}</span>`
      : '';
    if (!data) {
      html += `<div class="market-card" data-symbol="${escapeHtml(key)}" data-name="${escapeHtml(item.name)}" ${item.id ? 'data-crypto="' + item.id + '"' : ''} onclick="openChart(this)">
        <div class="market-card-name">${escapeHtml(item.name)}${countryTag}</div>
        <div class="market-card-loading">Loading...</div>
      </div>`;
      continue;
    }
    const up = data.change >= 0;
    const arrow = up ? '&#9650;' : '&#9660;';
    const cls = up ? 'price-up' : 'price-down';
    const sign = up ? '+' : '';
    const sourceBadge = (isCommodities && data.source)
      ? `<div class="market-card-source">${escapeHtml(data.source)}</div>`
      : '';
    const priceDisplay = isYield ? formatYield(data.price) : formatPrice(data.price, data.currency);
    const changeDisplay = isYield
      ? `${arrow} ${sign}${data.change.toFixed(3)} bps`
      : `${arrow} ${sign}${data.change.toFixed(2)} (${sign}${data.changePct.toFixed(2)}%)`;
    html += `<div class="market-card" data-symbol="${escapeHtml(data.symbol || key)}" data-name="${escapeHtml(item.name)}" ${item.id ? 'data-crypto="' + item.id + '"' : ''} onclick="openChart(this)">
      <div class="market-card-name">${escapeHtml(item.name)}${countryTag}</div>
      ${sourceBadge}
      <div class="market-card-price">${priceDisplay}</div>
      <div class="market-card-change ${cls}">${changeDisplay}</div>
    </div>`;
  }
  html += '</div></div>';
  return html;
}

function renderDashboard(market) {
  const config = MARKET_SYMBOLS[market];
  const container = document.getElementById(market + 'Dashboard');
  let html = '';
  html += renderMarketSection('Indices', config.indices);
  html += renderMarketSection('Fixed Income Yields', config.bonds);
  html += renderMarketSection('Commodities', config.commodities);
  html += renderMarketSection('Crypto', config.crypto);
  container.innerHTML = html;
}

function switchDashboardTab(market) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.sub-tab[data-subtab="${market}"]`).classList.add('active');
  document.querySelectorAll('.dashboard-sub').forEach(s => s.classList.remove('active'));
  document.getElementById(market + 'Dashboard').classList.add('active');
  closeChart();
}

function openChart(cardEl) {
  const symbol = cardEl.dataset.symbol;
  const name = cardEl.dataset.name;
  const cryptoId = cardEl.dataset.crypto || null;
  document.querySelectorAll('.market-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  showChart(symbol, name, cryptoId, '1mo', '1d');
}

function setChartStatus(message) {
  const statusEl = document.getElementById('chartStatus');
  statusEl.textContent = message || '';
}

function closeChart() {
  const panel = document.getElementById('chartPanel');
  panel.classList.remove('visible');
  document.querySelectorAll('.market-card').forEach(c => c.classList.remove('selected'));
  if (activeChart) { activeChart.destroy(); activeChart = null; }
  activeChartState = null;
  chartRequestId++;
  setChartStatus('');
}

function showChart(symbol, name, cryptoId, range, interval) {
  activeChartState = { symbol, name, cryptoId, range, interval };
  const panel = document.getElementById('chartPanel');
  const titleEl = document.getElementById('chartTitle');
  const rangeContainer = document.getElementById('rangeSelector');
  const requestId = ++chartRequestId;

  titleEl.textContent = name;
  panel.classList.add('visible');
  setChartStatus('Loading chart...');

  let rangeHtml = '';
  for (const r of CHART_RANGES) {
    const active = r.range === range ? ' active' : '';
    const symbolArg = JSON.stringify(symbol);
    const nameArg = JSON.stringify(name);
    const cryptoArg = cryptoId ? JSON.stringify(cryptoId) : 'null';
    rangeHtml += `<button class="range-btn${active}" onclick='showChart(${symbolArg},${nameArg},${cryptoArg},"${r.range}","${r.interval}")'>${r.label}</button>`;
  }
  rangeContainer.innerHTML = rangeHtml;

  if (activeChart) { activeChart.destroy(); activeChart = null; }

  const canvas = document.getElementById('priceChart');
  const ctx = canvas.getContext('2d');

  fetchChartData(symbol, range, interval, !!cryptoId, cryptoId)
    .then(payload => {
      if (requestId !== chartRequestId) return;
      const points = payload.points || [];
      if (points.length === 0) throw new Error('empty');
      const labels = points.map(p => {
        if (range === '1d' || range === '5d') {
          return p.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        return p.time.toLocaleDateString([], { month: 'short', day: 'numeric' });
      });
      const prices = points.map(p => p.price);
      const baseline = parseFiniteNumber(payload.baseline) ?? prices[0];
      const latest = prices[prices.length - 1];
      const up = latest >= baseline;
      const color = up ? '#22c55e' : '#e63946';

      activeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              data: prices,
              borderColor: color,
              borderWidth: 2,
              pointRadius: 0,
              pointHitRadius: 10,
              fill: true,
              backgroundColor: (context) => {
                const chart = context.chart;
                const { ctx: c, chartArea } = chart;
                if (!chartArea) return 'transparent';
                const grad = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                grad.addColorStop(0, up ? 'rgba(34,197,94,0.2)' : 'rgba(230,57,70,0.2)');
                grad.addColorStop(1, 'transparent');
                return grad;
              },
              tension: 0.3
            },
            {
              data: labels.map(() => baseline),
              borderColor: 'rgba(136,153,170,0.7)',
              borderWidth: 1,
              borderDash: [5, 4],
              pointRadius: 0,
              fill: false,
              tension: 0,
              hoverRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  if (ctx.datasetIndex === 1) return 'Prev close: ' + formatPrice(ctx.parsed.y, payload.currency || 'USD');
                  return formatPrice(ctx.parsed.y, payload.currency || 'USD');
                }
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(42,58,74,0.5)' },
              ticks: { color: '#5a6f82', maxTicksLimit: 8, font: { size: 11 } }
            },
            y: {
              grid: { color: 'rgba(42,58,74,0.5)' },
              ticks: { color: '#5a6f82', font: { size: 11 } }
            }
          },
          interaction: { intersect: false, mode: 'index' }
        }
      });
      setChartStatus('Updated now • trend vs previous close: ' + formatPrice(baseline, payload.currency || 'USD'));
    })
    .catch(() => {
      if (requestId !== chartRequestId) return;
      setChartStatus('Chart data unavailable for this instrument right now.');
    });
}

async function refreshDashboardQuotes() {
  if (dashRefreshInFlight) return;
  dashRefreshInFlight = true;
  const allSymbols = new Set();
  for (const market of ['dm', 'em']) {
    for (const item of MARKET_SYMBOLS[market].indices) allSymbols.add(item.symbol);
    for (const item of MARKET_SYMBOLS[market].bonds) allSymbols.add(item.symbol);
    for (const item of MARKET_SYMBOLS[market].commodities) allSymbols.add(item.symbol);
  }

  try {
    const [quoteMap, commodityDirectMap, bondDirectMap, cryptoMap] = await Promise.all([
      fetchYahooBatchQuotesChunked([...allSymbols]).catch(() => ({})),
      fetchCommodityDirectQuotes().catch(() => ({})),
      fetchBondDirectQuotes().catch(() => ({})),
      fetchCryptoQuotes().catch(() => ({}))
    ]);
    for (const [symbol, data] of Object.entries(quoteMap)) {
      dashData[symbol] = data;
    }
    for (const [symbol, data] of Object.entries(commodityDirectMap)) {
      dashData[symbol] = data;
    }
    for (const [symbol, data] of Object.entries(bondDirectMap)) {
      if (!dashData[symbol]) dashData[symbol] = data;
    }
    if (cryptoMap && typeof cryptoMap === 'object') {
      for (const [id, data] of Object.entries(cryptoMap)) {
        dashData[id] = data;
      }
    }
    const missingSymbols = [];
    for (const market of ['dm', 'em']) {
      for (const item of MARKET_SYMBOLS[market].indices) {
        if (!dashData[item.symbol]) missingSymbols.push(item.symbol);
      }
      for (const item of MARKET_SYMBOLS[market].bonds) {
        if (!dashData[item.symbol]) missingSymbols.push(item.symbol);
      }
      for (const item of MARKET_SYMBOLS[market].commodities) {
        if (!dashData[item.symbol]) missingSymbols.push(item.symbol);
      }
    }
    if (missingSymbols.length > 0) {
      const fallbackMap = await fetchYahooChartSnapshots([...new Set(missingSymbols)]);
      for (const [symbol, data] of Object.entries(fallbackMap)) {
        dashData[symbol] = data;
      }
    }
    const missingByMarket = {};
    for (const market of ['dm', 'em']) {
      const indicesMissing = MARKET_SYMBOLS[market].indices
        .map(i => i.symbol)
        .filter(sym => !dashData[sym]);
      const bondsMissing = MARKET_SYMBOLS[market].bonds
        .map(i => i.symbol)
        .filter(sym => !dashData[sym]);
      const commoditiesMissing = MARKET_SYMBOLS[market].commodities
        .map(i => i.symbol)
        .filter(sym => !dashData[sym]);
      missingByMarket[market] = { indicesMissing, bondsMissing, commoditiesMissing };
    }
    // #region agent log
    agentDebugLog('run-1','H3','index.html:refreshDashboardQuotes','Post-merge dashboard missing symbols', {
      quoteMapCount: Object.keys(quoteMap).length,
      cryptoMapCount: Object.keys(cryptoMap || {}).length,
      missingByMarket
    });
    // #endregion
    scheduleDashRender();
    saveDashCache(dashData);
    if (activeChartState) {
      const s = activeChartState;
      showChart(s.symbol, s.name, s.cryptoId, s.range, s.interval);
    }
  } catch (err) {
    // #region agent log
    agentDebugLog('run-1','H5','index.html:refreshDashboardQuotes','Dashboard refresh threw error', { error: String(err) });
    // #endregion
    throw err;
  } finally {
    dashRefreshInFlight = false;
  }
}

function ensureDashboardRefreshLoop() {
  if (dashboardRefreshTimer) return;
  dashboardRefreshTimer = setInterval(() => {
    const activeTab = document.querySelector('.tab.active')?.dataset.tab;
    if (activeTab === 'dashboard') refreshDashboardQuotes();
  }, DASH_REFRESH_MS);
}

async function loadDashboard() {
  // #region agent log
  agentDebugLog('run-2','H0','index.html:loadDashboard','Dashboard load entry', {
    dashboardLoaded,
    dashDataKeys: Object.keys(dashData).length
  });
  // #endregion
  if (dashboardLoaded && Object.keys(dashData).length > 0) {
    flushDashRender();
    ensureDashboardRefreshLoop();
    return;
  }

  const cached = loadDashCache();
  if (cached) {
    dashData = cached;
  }
  flushDashRender();
  await refreshDashboardQuotes();
  flushDashRender();
  dashboardLoaded = true;
  ensureDashboardRefreshLoop();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.feed').forEach(f => f.classList.remove('active'));
  document.getElementById(tab + 'Feed').classList.add('active');
  if (tab === 'dashboard') {
    loadDashboard();
  }
}

function processItems(items) {
  return items
    .filter(item => item.title.trim().length > 0)
    .map(item => ({ ...item, critical: isCritical(item.title + ' ' + item.snippet) }))
    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
}

async function fetchAllNews() {
  const btn = document.getElementById('fetchBtn');
  const loader = document.getElementById('loadingOverlay');
  const errorEl = document.getElementById('errorMsg');

  btn.classList.add('loading');
  btn.disabled = true;
  errorEl.classList.remove('visible');

  const cached = loadCache();
  if (cached) {
    newsData.global = cached.global;
    newsData.india = cached.india;
    renderFeed('global');
    renderFeed('india');
    document.getElementById('timestamp').textContent =
      'Cached \u2022 refreshing...';
  } else {
    document.getElementById('globalFeed').innerHTML = '';
    document.getElementById('indiaFeed').innerHTML = '';
    loader.classList.add('visible');
  }

  const errors = [];
  newsData.global = [];
  newsData.india = [];
  let settled = 0;
  const totalFeeds = FEEDS.global.length + FEEDS.india.length;

  const feedPromises = [];

  for (const f of FEEDS.global) {
    feedPromises.push(
      fetchFeed(f)
        .catch(() => { errors.push(f.name); return []; })
        .then(items => {
          newsData.global.push(...items);
          newsData.global = processItems(newsData.global);
          settled++;
          if (settled >= 3) {
            loader.classList.remove('visible');
            renderFeed('global');
          }
        })
    );
  }

  for (const f of FEEDS.india) {
    feedPromises.push(
      fetchFeed(f)
        .catch(() => { errors.push(f.name); return []; })
        .then(items => {
          newsData.india.push(...items);
          newsData.india = processItems(newsData.india);
          settled++;
          if (settled >= 3) {
            loader.classList.remove('visible');
            renderFeed('india');
          }
        })
    );
  }

  try {
    await Promise.all(feedPromises);

    renderFeed('global');
    renderFeed('india');

    saveCache(newsData);

    document.getElementById('timestamp').textContent =
      'Updated: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    if (errors.length > 0) {
      errorEl.textContent = 'Some sources could not be reached: ' + errors.join(', ') + '. Partial results shown.';
      errorEl.classList.add('visible');
    }

    if (newsData.global.length === 0 && newsData.india.length === 0) {
      errorEl.textContent = 'Could not fetch news from any source. This may be due to CORS restrictions. Try again or check your internet connection.';
      errorEl.classList.add('visible');
    }
  } catch (e) {
    errorEl.textContent = 'An unexpected error occurred: ' + e.message;
    errorEl.classList.add('visible');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    loader.classList.remove('visible');
  }
}

loadDashboard();
