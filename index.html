<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Market News</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0f1923;
    --bg-secondary: #1a2736;
    --bg-card: #1e2d3d;
    --bg-card-hover: #243647;
    --text-primary: #e8edf2;
    --text-secondary: #8899aa;
    --text-muted: #5a6f82;
    --accent: #00b4d8;
    --accent-hover: #0096c7;
    --danger: #e63946;
    --danger-bg: rgba(230, 57, 70, 0.08);
    --danger-border: rgba(230, 57, 70, 0.6);
    --border: #2a3a4a;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.25);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo h1 span { color: var(--accent); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .timestamp {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .btn-fetch {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .btn-fetch:hover { background: var(--accent-hover); }
  .btn-fetch:active { transform: scale(0.97); }
  .btn-fetch:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-fetch .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-fetch.loading .spinner { display: block; }
  .btn-fetch.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs {
    max-width: 1100px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 4px;
  }

  .tab {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 10px 24px;
    border-radius: 8px 8px 0 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover { color: var(--text-primary); }

  .tab.active {
    background: var(--bg-card);
    color: var(--accent);
    border-color: var(--accent);
    border-bottom: 1px solid var(--bg-card);
    position: relative;
    z-index: 2;
  }

  .tab .count {
    background: var(--bg-primary);
    color: var(--text-muted);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 6px;
  }

  .tab.active .count {
    background: rgba(0,180,216,0.15);
    color: var(--accent);
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  .feed-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) var(--radius);
    min-height: 400px;
    padding: 24px;
  }

  .feed { display: none; }
  .feed.active { display: block; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p { font-size: 15px; margin-top: 8px; }

  .news-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-left: 4px solid transparent;
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .news-card:hover {
    background: var(--bg-card-hover);
    border-left-color: var(--accent);
  }

  .news-card.critical {
    border-left-color: var(--danger) !important;
    background: var(--danger-bg);
  }

  .news-card.critical:hover {
    background: rgba(230, 57, 70, 0.12);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .badge-important {
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-primary);
    flex: 1;
  }

  .news-card.critical .card-title { color: #ff8a93; }

  .card-snippet {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-source {
    font-weight: 600;
    color: var(--accent);
  }

  .multi-source-badge {
    background: rgba(0,180,216,0.15);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
    cursor: pointer;
  }

  .sources-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    border-top: 0px solid var(--border);
    margin-top: 0;
  }

  .sources-panel.open {
    max-height: 500px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    padding-top: 12px;
  }

  .sources-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .source-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 4px;
    background: var(--bg-primary);
    border-radius: 6px;
    text-decoration: none;
    color: var(--text-primary);
    font-size: 13px;
    transition: background 0.15s;
  }

  .source-link:hover { background: var(--bg-card-hover); }

  .source-link-name {
    font-weight: 600;
    color: var(--accent);
    min-width: 140px;
    flex-shrink: 0;
  }

  .source-link-title {
    flex: 1;
    margin: 0 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .source-link-time {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .source-link-arrow {
    color: var(--text-muted);
    margin-left: 8px;
    font-size: 14px;
  }

  .loading-overlay {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .loading-overlay.visible { display: block; }

  .loading-overlay .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .loading-overlay .dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .loading-overlay .dot:nth-child(2) { animation-delay: 0.15s; }
  .loading-overlay .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .error-msg {
    background: rgba(230, 57, 70, 0.1);
    border: 1px solid var(--danger-border);
    color: #ff8a93;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat {
    font-size: 12px;
    color: var(--text-muted);
  }

  .stat strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .stat.critical-stat strong { color: var(--danger); }

  @media (max-width: 768px) {
    .header-inner { gap: 12px; }
    .feed-container { padding: 18px; }
    .news-card { padding: 16px 18px; }
    .card-meta { gap: 10px; flex-wrap: wrap; }
    .source-link-name { min-width: 100px; }
    .source-link-title { margin: 0 8px; }
  }

  @media (max-width: 640px) {
    header { padding: 14px 0; }

    .header-inner {
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      padding: 0 16px;
    }

    .logo { justify-content: center; }
    .logo h1 { font-size: 18px; }
    .logo-icon { width: 34px; height: 34px; font-size: 18px; }

    .header-actions {
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .btn-fetch {
      padding: 12px 20px;
      font-size: 14px;
      min-height: 44px;
      flex: 1;
      justify-content: center;
    }

    .timestamp {
      font-size: 11px;
      flex-shrink: 0;
    }

    .tabs {
      gap: 0;
      margin-top: 16px;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 10px 18px;
      font-size: 13px;
      min-height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex: 1;
      justify-content: center;
    }

    main { padding: 0 16px 40px; }

    .feed-container {
      padding: 14px;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .news-card {
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .card-header {
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-title { font-size: 14px; }
    .card-snippet { font-size: 13px; -webkit-line-clamp: 3; }

    .card-meta {
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
    }

    .card-meta span[style] {
      width: 100%;
      margin-left: 0 !important;
      margin-top: 4px;
    }

    .stats-bar {
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat { font-size: 11px; }

    .source-link {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 4px;
      min-height: 44px;
    }

    .source-link-name {
      min-width: auto;
      width: 100%;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .source-link-title {
      margin: 0;
      white-space: normal;
      -webkit-line-clamp: 2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      width: 100%;
      font-size: 12px;
    }

    .source-link-time { font-size: 10px; }
    .source-link-arrow { display: none; }

    .empty-state { padding: 50px 16px; }
    .empty-state .icon { font-size: 40px; }
    .empty-state h3 { font-size: 16px; }
    .empty-state p { font-size: 13px; }

    .badge-important { font-size: 9px; padding: 2px 6px; }
    .multi-source-badge { font-size: 10px; padding: 2px 6px; }

    .error-msg { font-size: 12px; padding: 12px 14px; }

    .loading-overlay { padding: 40px 16px; }
  }

  @media (max-width: 380px) {
    .header-inner { padding: 0 12px; }
    .tabs { padding: 0 12px; }
    main { padding: 0 12px 32px; }
    .feed-container { padding: 10px; }
    .news-card { padding: 12px; }
    .tab { padding: 10px 12px; font-size: 12px; }
    .card-title { font-size: 13px; }
    .btn-fetch { padding: 12px 16px; font-size: 13px; }
  }

  @media (hover: none) and (pointer: coarse) {
    .news-card { -webkit-tap-highlight-color: transparent; }
    .news-card:active {
      background: var(--bg-card-hover);
      border-left-color: var(--accent);
    }
    .news-card.critical:active {
      background: rgba(230, 57, 70, 0.12);
    }
    .btn-fetch:active { transform: scale(0.97); }
    .tab:active { color: var(--text-primary); }
    .source-link:active { background: var(--bg-card-hover); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">$</div>
      <h1>Market <span>Pulse</span></h1>
    </div>
    <div class="header-actions">
      <span class="timestamp" id="timestamp">Not yet fetched</span>
      <button class="btn-fetch" id="fetchBtn" onclick="fetchAllNews()">
        <div class="spinner"></div>
        <span class="btn-text">Fetch Latest News</span>
      </button>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="global" onclick="switchTab('global')">
    Global Markets <span class="count" id="globalCount">0</span>
  </button>
  <button class="tab" data-tab="india" onclick="switchTab('india')">
    Indian Markets <span class="count" id="indiaCount">0</span>
  </button>
</div>

<main>
  <div class="feed-container">
    <div id="errorMsg" class="error-msg"></div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <p style="color:var(--text-muted)">Fetching latest financial news...</p>
    </div>

    <div id="globalFeed" class="feed active">
      <div class="empty-state" id="globalEmpty">
        <div class="icon">&#128200;</div>
        <h3>Global Market News</h3>
        <p>Click "Fetch Latest News" to load headlines</p>
      </div>
    </div>

    <div id="indiaFeed" class="feed">
      <div class="empty-state" id="indiaEmpty">
        <div class="icon">&#127470;&#127475;</div>
        <h3>Indian Market News</h3>
        <p>Click "Fetch Latest News" to load headlines</p>
      </div>
    </div>
  </div>
</main>

<script>
const CRITICAL_KEYWORDS = [
  'crash','crisis','recession','default','war','sanction','collapse',
  'plunge','plunges','plunged','surge','surges','surged','panic',
  'emergency','breaking','alert','record high','record low',
  'rate cut','rate hike','inflation','bear market','sell-off','selloff',
  'volatility','tariff','trade war','downgrade','bankruptcy',
  'liquidity crisis','black swan','circuit breaker','halt','meltdown',
  'free fall','freefall','slump','tumble','rout','contagion',
  'geopolitical','escalation','retaliation'
];

const FEEDS = {
  global: [
    { name: 'Reuters Business',   url: 'https://feeds.reuters.com/reuters/businessNews' },
    { name: 'CNBC Top News',      url: 'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114' },
    { name: 'CNBC World',         url: 'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100727362' },
    { name: 'MarketWatch',        url: 'https://feeds.marketwatch.com/marketwatch/topstories/' },
    { name: 'Yahoo Finance',      url: 'https://finance.yahoo.com/news/rssindex' },
    { name: 'Bloomberg (via Google)', url: 'https://news.google.com/rss/search?q=site:bloomberg.com+markets&hl=en&gl=US&ceid=US:en' },
    { name: 'Financial Times (via Google)', url: 'https://news.google.com/rss/search?q=site:ft.com+markets&hl=en&gl=US&ceid=US:en' },
    { name: 'WSJ Markets (via Google)',     url: 'https://news.google.com/rss/search?q=site:wsj.com+markets&hl=en&gl=US&ceid=US:en' },
    { name: 'Google News Finance', url: 'https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtVnVHZ0pWVXlnQVAB?hl=en-US&gl=US&ceid=US:en' },
    { name: 'BBC Business',       url: 'https://feeds.bbci.co.uk/news/business/rss.xml' },
    { name: 'AP Business',        url: 'https://rsshub.app/apnews/topics/business' },
    { name: 'Investing.com',      url: 'https://www.investing.com/rss/news.rss' },
    { name: 'Nasdaq News',        url: 'https://www.nasdaq.com/feed/rssoutbound?category=Markets' },
  ],
  india: [
    { name: 'ET Markets',         url: 'https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms' },
    { name: 'ET Economy',         url: 'https://economictimes.indiatimes.com/news/economy/rssfeeds/1373380680.cms' },
    { name: 'Moneycontrol',       url: 'https://www.moneycontrol.com/rss/marketreports.xml' },
    { name: 'Moneycontrol Business', url: 'https://www.moneycontrol.com/rss/business.xml' },
    { name: 'LiveMint',           url: 'https://www.livemint.com/rss/markets' },
    { name: 'Business Standard',  url: 'https://www.business-standard.com/rss/markets-106.rss' },
    { name: 'NDTV Profit',        url: 'https://www.ndtvprofit.com/rss/feed' },
    { name: 'Hindu BusinessLine', url: 'https://www.thehindubusinessline.com/markets/feeder/default.rss' },
    { name: 'Financial Express',  url: 'https://www.financialexpress.com/market/feed/' },
    { name: 'Zee Business (via Google)', url: 'https://news.google.com/rss/search?q=site:zeebiz.com+market&hl=en-IN&gl=IN&ceid=IN:en' },
    { name: 'Google News India Markets', url: 'https://news.google.com/rss/search?q=India+stock+market+OR+sensex+OR+nifty&hl=en-IN&gl=IN&ceid=IN:en' },
    { name: 'RBI (via Google)',    url: 'https://news.google.com/rss/search?q=RBI+monetary+policy+OR+interest+rate&hl=en-IN&gl=IN&ceid=IN:en' },
  ]
};

const RSS2JSON_API = 'https://api.rss2json.com/v1/api.json?rss_url=';
const ALLORIGINS_API = 'https://api.allorigins.win/raw?url=';
const FETCH_TIMEOUT_MS = 6000;
const CACHE_KEY = 'marketpulse_cache';
const CACHE_TTL_MS = 5 * 60 * 1000;

let newsData = { global: [], india: [] };

function isCritical(text) {
  const lower = text.toLowerCase();
  return CRITICAL_KEYWORDS.some(kw => {
    const re = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
    return re.test(lower);
  });
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function timeAgo(dateStr) {
  const now = new Date();
  const then = new Date(dateStr);
  if (isNaN(then)) return '';
  const diffMs = now - then;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

function parseRss2Json(feedInfo) {
  return fetchWithTimeout(RSS2JSON_API + encodeURIComponent(feedInfo.url), FETCH_TIMEOUT_MS)
    .then(r => r.json())
    .then(data => {
      if (data.status !== 'ok' || !data.items) throw new Error('rss2json fail');
      return data.items.map(item => ({
        title: stripHtml(item.title || ''),
        snippet: stripHtml(item.description || item.content || '').slice(0, 250),
        link: item.link || '',
        pubDate: item.pubDate || '',
        source: feedInfo.name
      }));
    });
}

function parseAllOrigins(feedInfo) {
  return fetchWithTimeout(ALLORIGINS_API + encodeURIComponent(feedInfo.url), FETCH_TIMEOUT_MS)
    .then(r => r.text())
    .then(xml => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const items = doc.querySelectorAll('item');
      return Array.from(items).map(item => ({
        title: stripHtml(item.querySelector('title')?.textContent || ''),
        snippet: stripHtml(item.querySelector('description')?.textContent || '').slice(0, 250),
        link: item.querySelector('link')?.textContent || '',
        pubDate: item.querySelector('pubDate')?.textContent || '',
        source: feedInfo.name
      }));
    });
}

async function fetchFeed(feedInfo) {
  try {
    const result = await Promise.any([
      parseRss2Json(feedInfo).then(r => r.length > 0 ? r : Promise.reject('empty')),
      parseAllOrigins(feedInfo).then(r => r.length > 0 ? r : Promise.reject('empty'))
    ]);
    return result;
  } catch (_) {
    return [];
  }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const cached = JSON.parse(raw);
    if (Date.now() - cached.timestamp > CACHE_TTL_MS) return null;
    return cached;
  } catch (_) { return null; }
}

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      timestamp: Date.now(),
      global: data.global,
      india: data.india
    }));
  } catch (_) { /* storage full or unavailable */ }
}

const STOP_WORDS = new Set([
  'a','an','the','and','or','but','in','on','at','to','for','of','is','are','was',
  'were','be','been','being','have','has','had','do','does','did','will','would',
  'shall','should','may','might','can','could','with','from','by','as','into',
  'through','during','before','after','above','below','between','out','off','over',
  'under','again','further','then','once','that','this','these','those','it','its',
  'not','no','nor','so','very','just','also','about','up','more','most','than',
  'how','what','when','where','who','which','why','all','each','every','both',
  'few','some','such','only','own','same','too','s','t','re','ve','ll','d','m',
  'says','said','new','now','get','gets','got','us','vs','per',
]);

function extractSignificantWords(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 2 && !STOP_WORDS.has(w));
}

function similarity(wordsA, wordsB) {
  if (wordsA.length === 0 || wordsB.length === 0) return 0;
  const setA = new Set(wordsA);
  const setB = new Set(wordsB);
  let intersection = 0;
  for (const w of setA) { if (setB.has(w)) intersection++; }
  const union = new Set([...setA, ...setB]).size;
  return union === 0 ? 0 : intersection / union;
}

function groupSimilarNews(items) {
  const groups = [];
  const processed = items.map(item => ({
    item,
    words: extractSignificantWords(item.title)
  }));

  const used = new Set();
  for (let i = 0; i < processed.length; i++) {
    if (used.has(i)) continue;
    const group = [processed[i].item];
    used.add(i);
    for (let j = i + 1; j < processed.length; j++) {
      if (used.has(j)) continue;
      const sim = similarity(processed[i].words, processed[j].words);
      if (sim >= 0.4) {
        group.push(processed[j].item);
        used.add(j);
      }
    }
    const primary = group.reduce((best, cur) =>
      (cur.snippet.length > best.snippet.length) ? cur : best, group[0]);
    const critical = group.some(g => g.critical);
    const latestDate = group.reduce((best, cur) => {
      const d = new Date(cur.pubDate);
      return d > best ? d : best;
    }, new Date(0));

    groups.push({ primary, articles: group, critical, latestDate });
  }

  return groups.sort((a, b) => b.latestDate - a.latestDate);
}

function toggleSources(id) {
  const panel = document.getElementById('src-' + id);
  if (panel) panel.classList.toggle('open');
}

function renderFeed(category) {
  const container = document.getElementById(category + 'Feed');
  const items = newsData[category];

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">${category === 'global' ? '&#128200;' : '&#127470;&#127475;'}</div>
        <h3>${category === 'global' ? 'Global' : 'Indian'} Market News</h3>
        <p>No articles found. Try fetching again.</p>
      </div>`;
    return;
  }

  const groups = groupSimilarNews(items);
  const criticalCount = groups.filter(g => g.critical).length;
  const totalArticles = groups.reduce((sum, g) => sum + g.articles.length, 0);
  const uniqueSources = new Set(items.map(n => n.source)).size;

  let html = `<div class="stats-bar">
    <div class="stat"><strong>${groups.length}</strong> stories (<strong>${totalArticles}</strong> articles merged)</div>
    <div class="stat critical-stat"><strong>${criticalCount}</strong> critical</div>
    <div class="stat">from <strong>${uniqueSources}</strong> sources</div>
  </div>`;

  groups.forEach((group, idx) => {
    const p = group.primary;
    const isMerged = group.articles.length > 1;
    const cardId = category + idx;

    html += `<div class="news-card${group.critical ? ' critical' : ''}" ${!isMerged ? `onclick="window.open('${p.link}','_blank')"` : `onclick="toggleSources('${cardId}')"`}>
      <div class="card-header">
        ${group.critical ? '<span class="badge-important">Important</span>' : ''}
        ${isMerged ? `<span class="multi-source-badge">${group.articles.length} sources</span>` : ''}
        <div class="card-title">${escapeHtml(p.title)}</div>
      </div>
      ${p.snippet ? `<div class="card-snippet">${escapeHtml(p.snippet)}</div>` : ''}
      <div class="card-meta">
        <span class="card-source">${escapeHtml(p.source)}</span>
        ${p.pubDate ? `<span>${timeAgo(p.pubDate)}</span>` : ''}
        ${isMerged ? '<span style="margin-left:auto;color:var(--accent);font-size:11px;">Click to see all sources &#9662;</span>' : ''}
      </div>
      ${isMerged ? renderSourcesPanel(cardId, group.articles) : ''}
    </div>`;
  });

  container.innerHTML = html;
  document.getElementById(category + 'Count').textContent = groups.length;
}

function renderSourcesPanel(id, articles) {
  let html = `<div class="sources-panel" id="src-${id}">
    <div class="sources-panel-title">Read from any source:</div>`;
  for (const a of articles) {
    html += `<a href="${a.link}" target="_blank" rel="noopener" class="source-link" onclick="event.stopPropagation()">
      <span class="source-link-name">${escapeHtml(a.source)}</span>
      <span class="source-link-title">${escapeHtml(a.title)}</span>
      ${a.pubDate ? `<span class="source-link-time">${timeAgo(a.pubDate)}</span>` : ''}
      <span class="source-link-arrow">&#8594;</span>
    </a>`;
  }
  html += '</div>';
  return html;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.feed').forEach(f => f.classList.remove('active'));
  document.getElementById(tab + 'Feed').classList.add('active');
}

function processItems(items) {
  return items
    .filter(item => item.title.trim().length > 0)
    .map(item => ({ ...item, critical: isCritical(item.title + ' ' + item.snippet) }))
    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
}

async function fetchAllNews() {
  const btn = document.getElementById('fetchBtn');
  const loader = document.getElementById('loadingOverlay');
  const errorEl = document.getElementById('errorMsg');

  btn.classList.add('loading');
  btn.disabled = true;
  errorEl.classList.remove('visible');

  const cached = loadCache();
  if (cached) {
    newsData.global = cached.global;
    newsData.india = cached.india;
    renderFeed('global');
    renderFeed('india');
    document.getElementById('timestamp').textContent =
      'Cached \u2022 refreshing...';
  } else {
    document.getElementById('globalFeed').innerHTML = '';
    document.getElementById('indiaFeed').innerHTML = '';
    loader.classList.add('visible');
  }

  const errors = [];
  newsData.global = [];
  newsData.india = [];
  let settled = 0;
  const totalFeeds = FEEDS.global.length + FEEDS.india.length;

  const feedPromises = [];

  for (const f of FEEDS.global) {
    feedPromises.push(
      fetchFeed(f)
        .catch(() => { errors.push(f.name); return []; })
        .then(items => {
          newsData.global.push(...items);
          newsData.global = processItems(newsData.global);
          settled++;
          if (settled >= 3) {
            loader.classList.remove('visible');
            renderFeed('global');
          }
        })
    );
  }

  for (const f of FEEDS.india) {
    feedPromises.push(
      fetchFeed(f)
        .catch(() => { errors.push(f.name); return []; })
        .then(items => {
          newsData.india.push(...items);
          newsData.india = processItems(newsData.india);
          settled++;
          if (settled >= 3) {
            loader.classList.remove('visible');
            renderFeed('india');
          }
        })
    );
  }

  try {
    await Promise.all(feedPromises);

    renderFeed('global');
    renderFeed('india');

    saveCache(newsData);

    document.getElementById('timestamp').textContent =
      'Updated: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    if (errors.length > 0) {
      errorEl.textContent = 'Some sources could not be reached: ' + errors.join(', ') + '. Partial results shown.';
      errorEl.classList.add('visible');
    }

    if (newsData.global.length === 0 && newsData.india.length === 0) {
      errorEl.textContent = 'Could not fetch news from any source. This may be due to CORS restrictions. Try again or check your internet connection.';
      errorEl.classList.add('visible');
    }
  } catch (e) {
    errorEl.textContent = 'An unexpected error occurred: ' + e.message;
    errorEl.classList.add('visible');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    loader.classList.remove('visible');
  }
}
</script>
